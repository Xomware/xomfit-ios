name: XomFit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app
      
      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies 2>/dev/null || swift package resolve 2>/dev/null || true
        
      - name: Build
        run: |
          xcodebuild build \
            -scheme XomFit \
            -destination "platform=iOS Simulator,name=iPhone 15 Pro,OS=17.0" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcpretty || true
            
      - name: Test
        run: |
          xcodebuild test \
            -scheme XomFit \
            -destination "platform=iOS Simulator,name=iPhone 15 Pro,OS=17.0" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcpretty || true
