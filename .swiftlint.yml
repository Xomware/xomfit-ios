# XomFit SwiftLint Configuration
disabled_rules:
  - trailing_whitespace       # handled by editor
  - line_length               # SwiftUI view bodies can be long

opt_in_rules:
  - force_unwrapping
  - empty_count
  - closure_spacing
  - attributes
  - multiline_arguments
  - first_where
  - contains_over_filter_count
  - contains_over_filter_is_empty

included:
  - XomFit

excluded:
  - XomFit/Tests
  - XomFitTests
  - XomFitUITests
  - .build
  - Pods

# Thresholds
function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - vm
